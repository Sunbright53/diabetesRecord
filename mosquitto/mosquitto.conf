# Cheewarun — Mosquitto MQTT Broker

# MQTT (internal — backend subscribes here)
listener 1883
protocol mqtt

# WebSocket (nginx proxies wss://domain/mqtt → here)
listener 9001
protocol websockets

# Auth (no anonymous)
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
connection_messages true

# Limits
max_inflight_messages 20
max_queued_messages 1000
