# Mosquitto MQTT Broker — MetaBreath / Cheewarun
# ESP32 connects on port 1883 (TCP)
# Browser/nginx connects on port 9001 (WebSocket)

# ─── TCP listener (ESP32) ───────────────────────────────────
listener 1883
protocol mqtt

# ─── WebSocket listener (browser / nginx) ──────────────────
listener 9001
protocol websockets

# ─── Auth ──────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ─── Topic ACL ─────────────────────────────────────────────
# ESP32 devices publish to: metabreath/<device_id>/reading
# API subscriber reads all: metabreath/+/reading
acl_file /mosquitto/config/acl

# ─── Persistence ───────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ───────────────────────────────────────────────
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_timestamp true

# ─── Connection settings ───────────────────────────────────
max_keepalive 120
max_packet_size 65536
