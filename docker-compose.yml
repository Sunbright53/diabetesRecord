name: cheewarun

services:

  # ─── Frontend ────────────────────────────────────────────
  web:
    image: cheewarun-web:latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_VAPID_PUBLIC: ${NEXT_PUBLIC_VAPID_PUBLIC}
    depends_on:
      api:
        condition: service_started
    networks:
      - edge

  # ─── Backend API ─────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8010:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - internal

  # ─── Celery Worker ───────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Celery Beat (Scheduler) ─────────────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Database (Postgres + TimescaleDB) ───────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5440:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ─── MQTT Broker (Mosquitto) ─────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"   # Standard MQTT — ESP32 connects here
      - "127.0.0.1:9010:9001"   # WebSocket — browser/nginx connects here
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | head -n 1 | grep -v Error"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - edge
      - internal

  # ─── MQTT Subscriber (ESP32 → TimescaleDB) ───────────────
  mqtt-sub:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m app.workers.mqtt_subscriber
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    networks:
      - internal

networks:
  edge:
    name: cheewarun_edge
  internal:
    name: cheewarun_internal
    internal: true

volumes:
  pg_data:
    name: cheewarun_pg_data
  redis_data:
    name: cheewarun_redis_data
  mqtt_data:
    name: cheewarun_mqtt_data
  mqtt_log:
    name: cheewarun_mqtt_log
